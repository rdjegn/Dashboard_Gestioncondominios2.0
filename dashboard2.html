<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  padding: 20px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}
.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  text-align: center;
}
h2 {
  margin: 0;
  color: #2c3e50;
}
p {
  margin: 5px 0 0;
  color: gray;
}
</style>
</head>

<body>

<h2>🏢 Dashboard Condominio</h2>

<div class="grid">
  <div class="card">
    <h2>RD$ 85,000</h2>
    <p>Total Ingresos</p>
  </div>

  <div class="card">
    <h2>32</h2>
    <p>Pagos realizados</p>
  </div>

  <div class="card">
    <h2>RD$ 2,650</h2>
    <p>Promedio</p>
  </div>

  <div class="card">
    <h2>Mar 2026</h2>
    <p>Mes actual</p>
  </div>
</div>

</body>
</html>
